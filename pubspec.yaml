name: pulse
description: Habit tracker and focus timer for calm daily rituals.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^8.0.3
  go_router: ^15.1.2
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_staggered_grid_view: ^0.7.0
  live_activities:
    path: packages/live_activities
  permission_handler: ^12.0.3
  share_plus: ^11.0.0
  file_picker: ^10.1.9
  home_widget: ^0.9.2+1
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.26.1
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    # Only runtime images — keep launcher source out of the app bundle.
    - assets/branding/pulse_onboarding_hero.webp
    - assets/sounds/focus_tick.wav
    - assets/sounds/focus_warning.wav
    - assets/sounds/focus_complete.wav

flutter_launcher_icons:
  android: true
  ios: true
  image_path: tooling/branding/pulse_app_icon.png
  adaptive_icon_background: "#0e0f0c"
  adaptive_icon_foreground: tooling/branding/pulse_app_icon.png

flutter_native_splash:
  color: "#F3F6EF"
  android: true
  ios: true
